prefix          = /usr
exec_prefix     = /usr
sysconfdir      = /etc
localstatedir   = /var
sbindir         = /usr/sbin
logdir          = /var/log/freeradius
raddbdir        = /etc/freeradius
radacctdir      = /var/log/freeradius/radacct

name            = freeradius
confdir         = ${raddbdir}
modconfdir      = ${confdir}/mods-config
certdir         = ${confdir}/certs
cadir           = ${confdir}/certs
run_dir         = ${localstatedir}/run/${name}
db_dir          = ${raddbdir}
libdir          = /usr/lib/freeradius
pidfile         = ${run_dir}/${name}.pid
correct_escapes = true
max_request_time = 30
cleanup_delay   = 5
max_requests    = 16384
hostname_lookups = no

thread pool {
    start_servers         = 5
    max_servers           = 32
    min_spare_servers     = 3
    max_spare_servers     = 10
    max_requests_per_server = 0
    auto_limit_acct       = no
}

log {
    destination     = stdout
    colourise       = yes
    file            = ${logdir}/radius.log
    syslog_facility = daemon
    stripped_names  = no
    auth            = yes
    auth_badpass    = yes
    auth_goodpass   = yes
}

security {
    allow_core_dumps = no
    max_attributes   = 200
    reject_delay     = 1
    status_server    = yes
}

proxy_requests = no

$INCLUDE clients.conf

modules {
    $INCLUDE mods-enabled/
}

$INCLUDE sites-enabled/